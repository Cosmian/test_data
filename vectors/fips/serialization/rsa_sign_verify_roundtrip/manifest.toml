name = "Serialization: RSA Sign + Verify round-trip"
description = "Creates an RSA-2048 key pair, signs data with private key, verifies with public key — verifies asymmetric key material and attributes survive DB serialization"

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true

[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Sign"
request = "step2_sign.json"
assert_success = true

[steps.capture]
signature = "SignatureData"

[[steps]]
operation = "SignatureVerify"
request = "step3_verify.json"
assert_success = true

[steps.assert_fields]
ValidityIndicator = "Valid"
