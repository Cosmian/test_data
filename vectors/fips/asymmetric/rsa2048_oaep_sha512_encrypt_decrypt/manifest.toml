name = "RSA-2048 OAEP SHA-512 Encrypt and Decrypt"
description = "Creates an RSA-2048 key pair, encrypts data with OAEP/SHA-512, decrypts with the private key and verifies"

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true

[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true

[steps.capture]
ciphertext = "Data"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
