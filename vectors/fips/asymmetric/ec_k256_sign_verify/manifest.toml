name = "ECDSA secp256k1 (K-256) Sign and Verify"
description = "Creates a secp256k1 ECDSA key pair (non-FIPS), signs data with SHA-256, verifies the signature"

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true

[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Sign"
request = "step2_sign.json"
assert_success = true

[steps.capture]
signature = "SignatureData"

[[steps]]
operation = "SignatureVerify"
request = "step3_verify.json"
assert_success = true

[steps.assert_fields]
ValidityIndicator = "Valid"
