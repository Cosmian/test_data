name = "MySQL TDE KMIP Key Lifecycle"
description = """
Simulates MySQL Enterprise Transparent Data Encryption (TDE) KMIP 1.1 protocol: \
Create AES-256 key → Activate → Get → Revoke → Destroy.
"""
wire_format = "binary"
kmip_version = [1, 1]

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Activate"
request = "step2_activate.json"
assert_success = true

[[steps]]
operation = "Get"
request = "step3_get.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step4_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step5_destroy.json"
assert_success = true
