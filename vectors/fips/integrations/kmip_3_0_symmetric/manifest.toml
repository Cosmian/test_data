name = "KMIP 3.0 Symmetric Key Lifecycle (binary)"
description = "Creates AES-256 key, encrypts, decrypts, and destroys using KMIP 3.0 binary wire format"
wire_format = "binary"
kmip_version = [3, 0]

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Activate"
request = "step2_activate.json"
assert_success = true

[[steps]]
operation = "Encrypt"
request = "step3_encrypt.json"
assert_success = true

[steps.capture]
ciphertext = "Data"
iv_nonce = "IVCounterNonce"
auth_tag = "AuthenticatedEncryptionTag"

[[steps]]
operation = "Decrypt"
request = "step4_decrypt.json"
assert_success = true

[steps.assert_fields]
Data = "48656C6C6F204B4D495020332E3021"

[[steps]]
operation = "Revoke"
request = "step5_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy.json"
assert_success = true
