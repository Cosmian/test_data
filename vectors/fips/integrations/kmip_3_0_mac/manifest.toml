name = "KMIP 3.0 MAC Compute and Verify (binary)"
description = "Creates HMAC-SHA256 key, computes MAC, and verifies it using KMIP 3.0 binary wire format"
wire_format = "binary"
kmip_version = [3, 0]

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Activate"
request = "step2_activate.json"
assert_success = true

[[steps]]
operation = "MAC"
request = "step3_mac.json"
assert_success = true

[steps.capture]
mac_data = "MACData"

[[steps]]
operation = "MACVerify"
request = "step4_mac_verify.json"
assert_success = true

[steps.assert_fields]
ValidityIndicator = "Valid"

[[steps]]
operation = "Revoke"
request = "step5_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy.json"
assert_success = true
