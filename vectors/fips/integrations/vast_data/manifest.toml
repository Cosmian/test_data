name = "VAST Data Storage Appliance Key Lifecycle"
description = """
Simulates VAST Data EKM key management as observed in production logs (KMIP 1.4 Binary): \
Create AES-256 named key → AddAttribute → Activate → Locate by name → ReKey → Check → \
Get → GetAttributes (verify Active state) → Revoke → Destroy. \
Covers the ReKey bug (issue #845): VAST sends ReKey requests that previously \
returned 'unsupported KMIP 1 operation: ReKey'. \
AddAttribute is called by VAST after Create and before Activate to set key grouping metadata.
"""
wire_format = "json"
kmip_version = [1, 4]

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "AddAttribute"
request = "step2_add_attribute.json"
assert_success = true

[[steps]]
operation = "Activate"
request = "step3_activate.json"
assert_success = true

[[steps]]
operation = "Locate"
request = "step4_locate_by_name.json"
assert_success = true

[[steps]]
operation = "ReKey"
request = "step5_rekey.json"
assert_success = true

[[steps]]
operation = "Check"
request = "step6_check.json"
assert_success = true

[[steps]]
operation = "Get"
request = "step7_get.json"
assert_success = true

[[steps]]
operation = "GetAttributes"
request = "step8_get_attributes.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step9_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step10_destroy.json"
assert_success = true
