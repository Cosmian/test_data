name = "VAST Data Storage Appliance Key Lifecycle"
description = """
Simulates VAST Data EKM key management: \
Create AES-256 named key → Activate → Locate by name → ReKey → Check → \
Get → GetAttributes (verify Active state) → Revoke → Destroy. \
Derived from real VAST Data kmip_client.log traces (PyKMIP client, KMIP 1.2). \
Covers the ReKey bug (issue #845): VAST sends ReKey requests that previously \
returned 'unsupported KMIP 1 operation: ReKey'.
"""
wire_format = "json"
kmip_version = [1, 2]

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Activate"
request = "step2_activate.json"
assert_success = true

[[steps]]
operation = "Locate"
request = "step3_locate_by_name.json"
assert_success = true

[[steps]]
operation = "ReKey"
request = "step4_rekey.json"
assert_success = true

[[steps]]
operation = "Check"
request = "step5_check.json"
assert_success = true

[[steps]]
operation = "Get"
request = "step6_get.json"
assert_success = true

[[steps]]
operation = "GetAttributes"
request = "step7_get_attributes.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step8_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step9_destroy.json"
assert_success = true
