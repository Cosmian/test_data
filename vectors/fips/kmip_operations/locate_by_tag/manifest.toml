name = "Locate by Vendor Tag"
description = "Creates a key with a Cosmian vendor tag, then locates it using the tag filter"

[[steps]]
operation = "Create"
request = "step1_create_tagged_key.json"
assert_success = true

[steps.capture]
tagged_key_id = "UniqueIdentifier"

[[steps]]
operation = "Locate"
request = "step2_locate_by_tag.json"
assert_success = true

# Use assert_any_field instead of assert_fields: the shared PostgreSQL/MySQL
# database may contain leftover keys with the same tag from previous runs,
# so Locate can return multiple results. We only require that the newly
# created key is AMONG the results.
[steps.assert_any_field]
UniqueIdentifier = "{{tagged_key_id}}"

[[steps]]
operation = "Destroy"
request = "step3_destroy_key.json"
assert_success = true
