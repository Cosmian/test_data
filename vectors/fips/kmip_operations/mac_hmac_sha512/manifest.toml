name = "HMAC-SHA512 Compute"
description = "Creates an HMACSHA512 HMAC key, computes a MAC over data"

[[steps]]
operation = "Create"
request = "step1_create_hmac_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "MAC"
request = "step2_compute_mac.json"
assert_success = true

[steps.capture]
mac_data = "MACData"
