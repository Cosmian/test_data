name = "CreateSplitKey + JoinSplitKey: XOR 2-of-2 round-trip"
description = """
Creates an AES-256 symmetric key, splits it into 2 shares using XOR splitting (both shares
required). Then joins the 2 shares to reconstruct the key and verifies the reconstructed
object is a SymmetricKey.
"""

# Uses the default SQLite backend (single user, no cert auth required).

[[steps]]
operation      = "Create"
request        = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

# ── Split the key into 2 shares using XOR ────────────────────────────────────

[[steps]]
operation      = "CreateSplitKey"
request        = "step2_create_split_key.json"
assert_success = true

[steps.assert_count]
PrivateKeyUniqueIdentifier = 2

[steps.capture]
share1_id = "PrivateKeyUniqueIdentifier"

[steps.capture_nth.share2_id]
tag   = "PrivateKeyUniqueIdentifier"
index = 1

# ── Join both shares to reconstruct the key ──────────────────────────────────

[[steps]]
operation      = "JoinSplitKey"
request        = "step3_join_split_key.json"
assert_success = true

[steps.capture]
reconstructed_id = "UniqueIdentifier"

# ── Verify the reconstructed key is retrievable ──────────────────────────────

[[steps]]
operation      = "Get"
request        = "step4_get_reconstructed.json"
assert_success = true

[steps.assert_fields]
ObjectType = "SymmetricKey"

# ── Cleanup ──────────────────────────────────────────────────────────────────

[[steps]]
operation    = "Revoke"
request      = "cleanup_revoke_key_id.json"
allow_failure = true

[[steps]]
operation    = "Destroy"
request      = "cleanup_destroy_key_id.json"
allow_failure = true

[[steps]]
operation    = "Revoke"
request      = "cleanup_revoke_share1_id.json"
allow_failure = true

[[steps]]
operation    = "Destroy"
request      = "cleanup_destroy_share1_id.json"
allow_failure = true

[[steps]]
operation    = "Revoke"
request      = "cleanup_revoke_share2_id.json"
allow_failure = true

[[steps]]
operation    = "Destroy"
request      = "cleanup_destroy_share2_id.json"
allow_failure = true

[[steps]]
operation    = "Revoke"
request      = "cleanup_revoke_reconstructed_id.json"
allow_failure = true

[[steps]]
operation    = "Destroy"
request      = "cleanup_destroy_reconstructed_id.json"
allow_failure = true
