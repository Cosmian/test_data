name = "ReKey Deactivated Key Succeeds"
description = """
Verifies that ReKey on a Deactivated key succeeds. \
Per KMIP §6.1.46, Wrong_Key_Lifecycle_State is NOT listed in the Re-Key error table, \
meaning Deactivated keys are eligible for rotation.
"""

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# ReKey the active key (should succeed)
[[steps]]
operation = "ReKey"
request = "step2_rekey.json"
assert_success = true
[steps.capture]
new_key_id = "UniqueIdentifier"

# Revoke the old key explicitly (Active → Deactivated)
[[steps]]
operation = "Revoke"
request = "step3_revoke_old.json"
assert_success = true

# ReKey the now-deactivated old key (should succeed per KMIP spec)
[[steps]]
operation = "ReKey"
request = "step4_rekey_old_fails.json"
assert_success = true
[steps.capture]
rekey_deactivated_id = "UniqueIdentifier"

# Cleanup
[[steps]]
operation = "Destroy"
request = "step5_destroy_old.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step6_revoke_new.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step7_destroy_new.json"
assert_success = true

# Cleanup the key created from re-keying the deactivated key
[[steps]]
operation = "Revoke"
request = "step8_revoke_rekey_deactivated.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step9_destroy_rekey_deactivated.json"
assert_success = true
