name = "Get Attributes"
description = "Creates a symmetric key, retrieves its attributes, then cleans up"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "GetAttributes"
request = "step2_get_attributes.json"
assert_success = true

[steps.assert_fields]
CryptographicAlgorithm = "AES"
CryptographicLength = "256"

[[steps]]
operation = "Revoke"
request = "step3_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step4_destroy.json"
assert_success = true
