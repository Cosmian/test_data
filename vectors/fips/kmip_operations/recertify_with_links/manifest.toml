name = "ReCertify With Object Links"
description = """
Verifies that ReCertify properly sets ReplacementObjectLink on the old certificate \
and ReplacedObjectLink on the new certificate, forming a bidirectional chain. \
Also verifies that the new certificate is in Active state.
"""

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true
[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Activate"
request = "activate_private.json"
assert_success = true

[[steps]]
operation = "Certify"
request = "step2_certify.json"
assert_success = true
[steps.capture]
old_cert_id = "UniqueIdentifier"

[[steps]]
operation = "ReCertify"
request = "step3_recertify.json"
assert_success = true
[steps.capture]
new_cert_id = "UniqueIdentifier"

# Verify old cert has ReplacementObjectLink pointing to new cert
[[steps]]
operation = "GetAttributes"
request = "step4_get_attributes_old.json"
assert_success = true
[steps.assert_any_field]
LinkedObjectIdentifier = "{{new_cert_id}}"

# Verify new cert has ReplacedObjectLink pointing to old cert and State=Active
[[steps]]
operation = "GetAttributes"
request = "step5_get_attributes_new.json"
assert_success = true
[steps.assert_any_field]
LinkedObjectIdentifier = "{{old_cert_id}}"
[steps.assert_fields]
State = "Active"

# Cleanup — certificates are Active, require Revoke before Destroy
[[steps]]
operation = "Revoke"
request = "step6_revoke_old_cert.json"
assert_success = true
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step7_destroy_old_cert.json"
assert_success = true
allow_failure = true

[[steps]]
operation = "Revoke"
request = "step8_revoke_new_cert.json"
assert_success = true
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step9_destroy_new_cert.json"
assert_success = true
allow_failure = true

# Keys are PreActive, can be destroyed directly
[[steps]]
operation = "Destroy"
request = "step10_destroy_private.json"
assert_success = true
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step11_destroy_public.json"
assert_success = true
allow_failure = true
