name = "ReKey Deactivated Key Fails"
description = """
Verifies that ReKey on a non-Active key fails with an appropriate error. \
Only Active symmetric keys can be re-keyed.
"""

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# ReKey the active key (should succeed)
[[steps]]
operation = "ReKey"
request = "step2_rekey.json"
assert_success = true
[steps.capture]
new_key_id = "UniqueIdentifier"

# Revoke the old key explicitly (Active → Deactivated); ReKey does NOT deactivate it
[[steps]]
operation = "Revoke"
request = "step3_revoke_old.json"
assert_success = true

# Try to ReKey the now-deactivated old key (should fail)
[[steps]]
operation = "ReKey"
request = "step4_rekey_old_fails.json"
assert_success = false
assert_error_contains = "no active symmetric key found"

# Cleanup
[[steps]]
operation = "Destroy"
request = "step5_destroy_old.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step6_revoke_new.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step7_destroy_new.json"
assert_success = true
