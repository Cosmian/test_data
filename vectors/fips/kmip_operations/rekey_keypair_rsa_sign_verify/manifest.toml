name = "ReKeyKeyPair RSA Sign/Verify With New Key"
description = """
Verifies that after ReKeyKeyPair on an RSA-2048 key pair, the new private key \
can sign and the new public key can verify the signature (RSA-PSS SHA-256).
Complements rekey_keypair_rsa_encrypt_decrypt and rekey_keypair_ec_sign_verify.
"""

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true
[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "ReKeyKeyPair"
request = "step2_rekey_keypair.json"
assert_success = true
[steps.capture]
new_private_key_id = "PrivateKeyUniqueIdentifier"
new_public_key_id = "PublicKeyUniqueIdentifier"

# Sign with new private key using RSA-PSS SHA-256
[[steps]]
operation = "Sign"
request = "step3_sign.json"
assert_success = true
[steps.capture]
signature = "SignatureData"

# Verify with new public key
[[steps]]
operation = "SignatureVerify"
request = "step4_verify.json"
assert_success = true

# Cleanup
[[steps]]
operation = "Revoke"
request = "step5_revoke_old_sk.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy_old_sk.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step7_revoke_new_sk.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step8_destroy_new_sk.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step9_revoke_old_pk.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step9_destroy_old_pk.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step10_revoke_new_pk.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step10_destroy_new_pk.json"
assert_success = true
