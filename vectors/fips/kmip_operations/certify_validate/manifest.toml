name = "Certify and Validate Certificate"
description = "Creates an EC key pair, self-signs a certificate, validates it, then cleans up"

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true

[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Certify"
request = "step2_certify.json"
assert_success = true

[steps.capture]
cert_id = "UniqueIdentifier"

[[steps]]
operation = "Validate"
request = "step3_validate.json"
assert_success = true

[steps.assert_fields]
ValidityIndicator = "Valid"

[[steps]]
operation = "Destroy"
request = "step4_destroy_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step5_destroy_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy_public.json"
assert_success = true
