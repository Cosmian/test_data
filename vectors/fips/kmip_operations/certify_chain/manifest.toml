name = "Certificate Chain: Root CA → Intermediate CA → Leaf, then Validate"
description = """
Creates a 3-level X.509 chain:
  1. Root CA keypair + self-signed cert with basicConstraints CA:true
  2. Intermediate CA keypair + cert signed by root with basicConstraints CA:true
  3. Leaf keypair + cert signed by intermediate
  4. Validate the full chain (root + intermediate + leaf)
"""

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_root_keypair.json"
assert_success = true

[steps.capture]
root_private_key_id = "PrivateKeyUniqueIdentifier"
root_public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Activate"
request = "activate_root_private.json"
assert_success = true

[[steps]]
operation = "Certify"
request = "step2_self_sign_root.json"
assert_success = true

[steps.capture]
root_bootstrap_cert_id = "UniqueIdentifier"

[[steps]]
operation = "Certify"
request = "step3_recertify_root_with_root.json"
assert_success = true

[steps.capture]
root_cert_id = "UniqueIdentifier"

[[steps]]
operation = "CreateKeyPair"
request = "step3_create_intermediate_keypair.json"
assert_success = true

[steps.capture]
int_private_key_id = "PrivateKeyUniqueIdentifier"
int_public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Activate"
request = "activate_int_private.json"
assert_success = true

[[steps]]
operation = "Certify"
request = "step4_sign_intermediate_with_root.json"
assert_success = true

[steps.capture]
int_cert_id = "UniqueIdentifier"

[[steps]]
operation = "CreateKeyPair"
request = "step5_create_leaf_keypair.json"
assert_success = true

[steps.capture]
leaf_private_key_id = "PrivateKeyUniqueIdentifier"
leaf_public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Certify"
request = "step6_sign_leaf_with_intermediate.json"
assert_success = true

[steps.capture]
leaf_cert_id = "UniqueIdentifier"

[[steps]]
operation = "Validate"
request = "step7_validate_chain.json"
assert_success = true

[steps.assert_fields]
ValidityIndicator = "Valid"

# ── Cleanup ──────────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step8_destroy_leaf_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step9_destroy_int_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step10_destroy_root_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step11_destroy_leaf_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step12_destroy_leaf_public.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "revoke_int_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step13_destroy_int_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step14_destroy_int_public.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "revoke_root_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step15_destroy_root_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step16_destroy_root_public.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step17_destroy_root_bootstrap_cert.json"
assert_success = true
