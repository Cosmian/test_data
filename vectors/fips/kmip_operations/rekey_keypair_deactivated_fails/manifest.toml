name = "Negative: ReKeyKeyPair Deactivated Key Fails"
description = """
Verifies that ReKeyKeyPair on a Deactivated private key fails.
Only Active or PreActive private keys are eligible for rekey.
"""

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true
[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

# Revoke the private key (Active → Deactivated)
[[steps]]
operation = "Revoke"
request = "step2_revoke.json"
assert_success = true

# Try to ReKeyKeyPair the deactivated private key — must fail
[[steps]]
operation = "ReKeyKeyPair"
request = "step3_rekey_keypair.json"
assert_success = false
assert_error_reason = "Item_Not_Found"

# Cleanup: private key is already Deactivated, can Destroy directly
[[steps]]
operation = "Destroy"
request = "step4_destroy_sk.json"
assert_success = true

# Cleanup: public key is still Active (Revoke was not cascaded), must Revoke first
[[steps]]
operation = "Revoke"
request = "step5_revoke_public.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy_public.json"
assert_success = true
