name = "Import Symmetric Key"
description = "Imports an AES-256 key with explicit UID, gets it, revokes, and destroys"

[[steps]]
operation = "Import"
request = "step1_import.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step2_get.json"
assert_success = true

[steps.assert_fields]
ObjectType = "SymmetricKey"

[[steps]]
operation = "Revoke"
request = "step3_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step4_destroy.json"
assert_success = true
