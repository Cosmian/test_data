name = "Process Window: Encrypt rejected after ProtectStopDate has passed"
description = """
Creates an Active symmetric key, then sets its ProtectStopDate to a date in the past \
via SetAttribute.  An Encrypt attempt must be rejected with \
Wrong_Key_Lifecycle_State even though the key state is still Active.

This verifies that the server enforces the KMIP process-window check \
(ProcessStartDate..ProtectStopDate) independently of the key state.
"""

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# Set ProtectStopDate to a fixed date well in the past (2020-01-01).
[[steps]]
operation = "SetAttribute"
request = "step2_set_protect_stop_past.json"
assert_success = true

# Encrypt must fail: key is within Active state but outside its process window.
[[steps]]
operation = "Encrypt"
request = "step3_encrypt.json"
assert_success = false
assert_error_reason = "Wrong_Key_Lifecycle_State"

# Cleanup
[[steps]]
operation = "Revoke"
request = "step4_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step5_destroy.json"
assert_success = true
