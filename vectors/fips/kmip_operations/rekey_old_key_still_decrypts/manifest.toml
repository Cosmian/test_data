name = "ReKey Old Key Deactivated After Rotation"
description = """
Verifies that after ReKey, the old key is Deactivated (KMIP §4.57 transition 6) \
and can no longer be used for encryption.
"""

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "ReKey"
request = "step3_rekey.json"
assert_success = true
[steps.capture]
new_key_id = "UniqueIdentifier"

# Old key is Deactivated after ReKey (KMIP §4.57) — Encrypt must fail
[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = false
assert_error_contains = "is in state"

# Cleanup
[[steps]]
operation = "Revoke"
request = "step5_revoke_old.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy_old.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step7_revoke_new.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step8_destroy_new.json"
assert_success = true
