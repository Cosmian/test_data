name = "Keyset Decrypt After Double Rotation"
description = """
Tests try-each-key across a 3-generation chain:
1. Create key (gen 0), encrypt data
2. ReKey once (gen 1)
3. ReKey again (gen 2)
4. Decrypt using bare keyset name — must walk gen2→gen1→gen0 to find the right key
Proves chain traversal works beyond a single hop.
"""

[[steps]]
operation = "Create"
request = "step01_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step03_encrypt.json"
assert_success = true
[steps.capture]
ciphertext = "Data"
nonce = "IVCounterNonce"
auth_tag = "AuthenticatedEncryptionTag"

# First rotation: gen 0 → gen 1
[[steps]]
operation = "ReKey"
request = "step04_rekey1.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# Second rotation: gen 1 → gen 2
[[steps]]
operation = "ReKey"
request = "step05_rekey2.json"
assert_success = true
[steps.capture]
gen2_id = "UniqueIdentifier"

# Decrypt with bare keyset name: walks gen2→gen1→gen0
[[steps]]
operation = "Decrypt"
request = "step06_decrypt_by_keyset.json"
assert_success = true

# Cleanup all 3 generations
[[steps]]
operation = "Revoke"
request = "step07_revoke_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step08_destroy_gen0.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step09_revoke_gen1.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step10_destroy_gen1.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step11_revoke_gen2.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step12_destroy_gen2.json"
assert_success = true
