name = "Secret Data Lifecycle"
description = "Registers a password as SecretData, retrieves it with Get, then destroys"

[[steps]]
operation = "Register"
request = "step1_register.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step2_get.json"
assert_success = true

[steps.assert_fields]
ObjectType = "SecretData"

[[steps]]
operation = "Activate"
request = "step3_activate.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step4_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step5_destroy.json"
assert_success = true
