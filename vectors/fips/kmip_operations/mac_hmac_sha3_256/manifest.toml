name = "HMAC-SHA3256 Compute"
description = "Imports an HMACSHA3256 HMAC key, computes a MAC over data"

[[steps]]
operation = "Import"
request = "step1_import_hmac_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "MAC"
request = "step2_compute_mac.json"
assert_success = true

[steps.capture]
mac_data = "MACData"
