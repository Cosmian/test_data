name = "Get Attribute List"
description = "Creates a key and retrieves the list of its attribute names"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "GetAttributeList"
request = "step2_get_attribute_list.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step3_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step4_destroy.json"
assert_success = true
