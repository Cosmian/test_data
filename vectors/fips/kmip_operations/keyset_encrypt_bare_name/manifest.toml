name = "Keyset Encrypt with Bare Name"
description = """
Creates a symmetric key with rotate_name set, then encrypts using \
only the bare keyset name (no @version suffix). For Encrypt operations, \
bare keyset names resolve to the latest key (SingleLatest mode).
"""

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step3_encrypt_bare.json"
assert_success = true
[steps.capture]
ciphertext = "Data"
nonce = "IVCounterNonce"
auth_tag = "AuthenticatedEncryptionTag"

# Decrypt with direct UID confirms ciphertext validity
[[steps]]
operation = "Decrypt"
request = "step4_decrypt_by_uid.json"
assert_success = true

# Cleanup
[[steps]]
operation = "Revoke"
request = "step5_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy.json"
assert_success = true
