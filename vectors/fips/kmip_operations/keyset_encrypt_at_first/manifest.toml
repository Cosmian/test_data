name = "Keyset Encrypt with @first"
description = """
Creates a symmetric key, assigns a rotate_name, performs a ReKey, \
then encrypts data using the keyset name@first syntax. Verifies \
that @first resolves to gen-0 by decrypting with the original key UID.
"""

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "SetAttribute"
request = "step2_set_rotate_name.json"
assert_success = true

# ReKey: gen-0 → gen-1
[[steps]]
operation = "ReKey"
request = "step3_rekey.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# Encrypt with name@first — must resolve to gen-0
[[steps]]
operation = "Encrypt"
request = "step4_encrypt_at_first.json"
assert_success = true
[steps.capture]
ciphertext = "Data"
nonce = "IVCounterNonce"
auth_tag = "AuthenticatedEncryptionTag"

# Decrypt with gen-0 UID — proves @first resolved to gen-0
[[steps]]
operation = "Decrypt"
request = "step5_decrypt_by_gen0.json"
assert_success = true

# Cleanup
[[steps]]
operation = "Revoke"
request = "step6_revoke_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step7_destroy_gen0.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step8_revoke_gen1.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step9_destroy_gen1.json"
assert_success = true
