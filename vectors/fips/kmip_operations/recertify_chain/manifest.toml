name = "ReCertify in Certificate Chain"
description = """
Creates a root CA (self-signed) and a leaf certificate signed by the root, \
then performs ReCertify on the leaf certificate. Verifies the new leaf cert \
has proper replacement links and Active state.
"""

[[steps]]
operation = "CreateKeyPair"
request = "step01_create_root_keypair.json"
assert_success = true
[steps.capture]
root_private_key_id = "PrivateKeyUniqueIdentifier"
root_public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Certify"
request = "step02_self_sign_root.json"
assert_success = true
[steps.capture]
root_cert_id = "UniqueIdentifier"

[[steps]]
operation = "CreateKeyPair"
request = "step03_create_leaf_keypair.json"
assert_success = true
[steps.capture]
leaf_private_key_id = "PrivateKeyUniqueIdentifier"
leaf_public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Certify"
request = "step04_sign_leaf_with_root.json"
assert_success = true
[steps.capture]
old_leaf_cert_id = "UniqueIdentifier"

[[steps]]
operation = "ReCertify"
request = "step05_recertify_leaf.json"
assert_success = true
[steps.capture]
new_leaf_cert_id = "UniqueIdentifier"

# Verify the new leaf cert has ReplacedObjectLink and Active state
[[steps]]
operation = "GetAttributes"
request = "step06_get_attributes_new_leaf.json"
assert_success = true
[steps.assert_any_field]
LinkedObjectIdentifier = "{{old_leaf_cert_id}}"
[steps.assert_fields]
State = "Active"

# Cleanup — certificates are Active, require Revoke before Destroy
[[steps]]
operation = "Revoke"
request = "step07_revoke_old_leaf_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step08_destroy_old_leaf_cert.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step09_revoke_new_leaf_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step10_destroy_new_leaf_cert.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step11_revoke_root_cert.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step12_destroy_root_cert.json"
assert_success = true

# Keys are PreActive, can be destroyed directly
[[steps]]
operation = "Destroy"
request = "step13_destroy_leaf_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step14_destroy_leaf_public.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step15_destroy_root_private.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step16_destroy_root_public.json"
assert_success = true
