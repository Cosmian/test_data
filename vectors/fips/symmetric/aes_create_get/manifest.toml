name = "AES-256 Create and Get"
description = "Creates an AES-256 symmetric key and retrieves it via Get"

[[steps]]
operation = "Create"
request = "step1_request.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step2_request.json"
assert_success = true

[steps.assert_fields]
ObjectType = "SymmetricKey"
