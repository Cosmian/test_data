name = "EDB TDE KMIP — PyKMIP Variant (Server-Side Wrap/Unwrap)"
description = """
Simulates the EDB Postgres TDE workflow using the pykmip variant:
Create AES-256 master key → Activate → Encrypt (wrap DEK) → Decrypt (unwrap DEK).
This proves Cosmian KMS is compatible with edb_tde_kmip_client.py --variant=pykmip.
"""

[[steps]]
operation = "Create"
request = "step1_create_master_key.json"
assert_success = true

[steps.capture]
master_key_id = "UniqueIdentifier"

[[steps]]
operation = "Activate"
request = "step2_activate.json"
assert_success = true

[[steps]]
operation = "Encrypt"
request = "step3_encrypt_dek.json"
assert_success = true

[steps.capture]
ciphertext = "Data"
nonce = "IVCounterNonce"

[[steps]]
operation = "Decrypt"
request = "step4_decrypt_dek.json"
assert_success = true

[steps.assert_fields]
Data = "48656C6C6F20454442205444452044454B2064617461"

[[steps]]
operation = "Revoke"
request = "step5_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy.json"
assert_success = true
