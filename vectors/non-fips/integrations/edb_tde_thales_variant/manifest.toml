name = "EDB TDE KMIP — Thales Variant (Server-Side Wrap, IV prepended in Data)"
description = """
Simulates the EDB Postgres TDE workflow using the thales variant of
edb_tde_kmip_client.py:
  Create AES-256 master key → Activate → Encrypt (wrap DEK) → Decrypt (unwrap DEK)

The key difference from the pykmip variant is in the Decrypt step:
  - pykmip: sends Data=ciphertext, IVCounterNonce=iv (IV as a separate field)
  - thales:  sends Data=IV||ciphertext (IV prepended to ciphertext), no IVCounterNonce

When IVCounterNonce is absent the KMS uses an all-zero IV (decrypt.rs fix).
AES-256-CBC then decrypts [IV_block][CT_0]...[CT_n] with zero IV, producing
[garbage_16_bytes][PT_0]...[PT_n].  The client strips the first 16 bytes to
recover the original plaintext.

The Decrypt step only asserts success (assert_success = true) because the first
16 bytes of the KMS response are non-deterministic (depend on the random IV
generated during Encrypt).  The assert_success check is the critical regression
guard: before the decrypt.rs zero-IV fix this step would fail with
"invalid-iv-length" / "missing-iv".
"""

[[steps]]
operation = "Create"
request = "step1_create_master_key.json"
assert_success = true

[steps.capture]
master_key_id = "UniqueIdentifier"

[[steps]]
operation = "Activate"
request = "step2_activate.json"
assert_success = true

[[steps]]
operation = "Encrypt"
request = "step3_encrypt_dek.json"
assert_success = true

[steps.capture]
ciphertext = "Data"
nonce = "IVCounterNonce"

[[steps]]
# Thales variant: Data = IV || ciphertext, no IVCounterNonce field.
# KMS must decrypt successfully using an all-zero IV (decrypt.rs zero-IV fix).
# The response Data = [16 garbage bytes][original plaintext]; the EDB client
# strips the first 16 bytes to recover the plaintext.
operation = "Decrypt"
request = "step4_decrypt_dek_thales.json"
assert_success = true

[[steps]]
operation = "Revoke"
request = "step5_revoke.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step6_destroy.json"
assert_success = true
