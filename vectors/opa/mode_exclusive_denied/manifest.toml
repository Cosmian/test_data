name = "OPA Mode 2 (Exclusive): non-owner access denied"
description = "OPA exclusive mode; owner (mTLS cert) creates AES key; ungranted user (different cert, no roles) is denied Get."
requires_env = ["KMS_OPA_URL"]
backends = ["sqlite"]

[identities.owner]
client_cert = "test_data/certificates/client_server/owner/owner.client.acme.com.crt"
client_key = "test_data/certificates/client_server/owner/owner.client.acme.com.key"

[identities.user]
client_cert = "test_data/certificates/client_server/user/user.client.acme.com.crt"
client_key = "test_data/certificates/client_server/user/user.client.acme.com.key"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true
identity = "owner"

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step2_get.json"
identity = "user"
assert_success = false
assert_error_reason = "Object_Not_Found"
assert_error_contains = "not found"

[[steps]]
operation = "Destroy"
request = "step3_destroy.json"
identity = "owner"
allow_failure = true
