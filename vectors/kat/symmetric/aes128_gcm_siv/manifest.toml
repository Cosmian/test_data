name = "KAT: AES-128-GCM-SIV (RFC 8452 self-computed)"
description = "Known-Answer Test: AES-128-GCM-SIV with fixed key and nonce; reference values computed from RFC 8452 implementation"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true
[steps.assert_fields]
Data = "4CD07B7830DE7AA68C937FC688F36924D88B7F98E0902F"
AuthenticatedEncryptionTag = "38840F9FE293E37157D3D1472DB46596"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F2C204145532D3132382D47434D2D53495621"
