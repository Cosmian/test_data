name = "KAT: AES-256-GCM-SIV (RFC 8452 self-computed)"
description = "Known-Answer Test: AES-256-GCM-SIV with fixed key and nonce; reference values computed from RFC 8452 implementation"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true
[steps.assert_fields]
Data = "DC210E6F17B45F7D097AB65FA67A8422BE2575EEA92F98"
AuthenticatedEncryptionTag = "4FE4EE0CF4336DC842D50BC8E0251568"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F2C204145532D3235362D47434D2D53495621"
