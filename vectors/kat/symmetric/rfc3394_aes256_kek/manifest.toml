name = "KAT: RFC 3394 AES-256 KEK (§4.3)"
description = "Known-Answer Test: RFC 3394 key wrap with 256-bit KEK, 128-bit plaintext (RFC 3394 §4.3)"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_wrap.json"
assert_success = true

[steps.assert_fields]
Data = "64E8C3F9CE0F5BA263E9777905818A2A93C8191E7D6E8AE7"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "00112233445566778899AABBCCDDEEFF"
