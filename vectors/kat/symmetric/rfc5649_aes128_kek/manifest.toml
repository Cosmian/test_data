name = "KAT: RFC 5649 AES-128 KEK"
description = "Known-Answer Test: RFC 5649 key wrap with padding with 128-bit KEK, 128-bit plaintext"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_wrap.json"
assert_success = true

[steps.assert_fields]
Data = "2CEF0C9E30DE26016C230CB78BC60D51B1FE083BA0C79CD5"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "00112233445566778899AABBCCDDEEFF"
