name = "KAT: RFC 3394 AES-128 KEK (§4.1)"
description = "Known-Answer Test: RFC 3394 key wrap with 128-bit KEK, 128-bit plaintext (RFC 3394 §4.1)"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_wrap.json"
assert_success = true

[steps.assert_fields]
Data = "1FA68B0A8112B447AEF34BD8FB5A7B829D3E862371D2CFE5"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "00112233445566778899AABBCCDDEEFF"
