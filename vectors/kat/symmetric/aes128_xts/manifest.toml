name = "KAT: AES-128-XTS (self-computed)"
description = "Known-Answer Test: AES-128 XTS with all-zero tweak"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true
[steps.assert_fields]
Data = "964F02C385B6F0167E6B9C45C245A04E"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F2C204145532D5854532121"
