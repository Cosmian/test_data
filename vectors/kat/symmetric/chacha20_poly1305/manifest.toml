name = "KAT: ChaCha20-Poly1305 (self-computed, key=0*32, nonce=0*12)"
description = "Known-Answer Test: ChaCha20-Poly1305 with all-zero key and nonce"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true
[steps.assert_fields]
Data = "D7628BD23A7D1839F0DBD414121F382C"
AuthenticatedEncryptionTag = "7F8D418116F63FFC0DB22ABE50F57EE1"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F2C20436861436861323021"
