name = "KAT: AES-128-CBC (NIST SP 800-38A)"
description = "Known-Answer Test: AES-128 CBC first block, NIST SP 800-38A reference"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true
[steps.assert_fields]
Data = "7649ABAC8119B246CEE98E9B12E9197D"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "6BC1BEE22E409F96E93D7E117393172A"
