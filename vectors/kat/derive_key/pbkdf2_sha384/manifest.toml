name = "KAT: PBKDF2-SHA384 (known 32-byte password, salt='salt', 4096 iters)"
description = "Known-Answer Test: PBKDF2-SHA384 with 32-byte password key, 4096 iterations"

[[steps]]
operation = "Import"
request = "step1_import_password.json"
assert_success = true
[steps.capture]
base_key_id = "UniqueIdentifier"

[[steps]]
operation = "DeriveKey"
request = "step2_derive.json"
assert_success = true
[steps.capture]
derived_key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step3_get.json"
assert_success = true
[steps.assert_fields]
KeyMaterial = "B13B37AC36A53803E7167826C65AA4F62DF31AF721A56951C9FEBC09E4CB05D7"
