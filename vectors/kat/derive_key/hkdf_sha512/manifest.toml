name = "KAT: HKDF-SHA512 (IKM=0x0b*32, 32-byte output)"
description = "Known-Answer Test: HKDF-SHA512 with RFC 5869-style salt and info, 32-byte derived key"

[[steps]]
operation = "Import"
request = "step1_import_base_key.json"
assert_success = true
[steps.capture]
base_key_id = "UniqueIdentifier"

[[steps]]
operation = "DeriveKey"
request = "step2_derive.json"
assert_success = true
[steps.capture]
derived_key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step3_get.json"
assert_success = true
[steps.assert_fields]
KeyMaterial = "A3132BB9A5FE91980AD113BF32A0FAB25C3CDF55ED25341EACF455B534F37E80"
