name = "KAT: HKDF-SHA256 (IKM=0x0b*32, 32-byte output)"
description = "Known-Answer Test: HKDF-SHA256 with RFC 5869 §A.1-style salt and info, 32-byte derived key"

[[steps]]
operation = "Import"
request = "step1_import_base_key.json"
assert_success = true
[steps.capture]
base_key_id = "UniqueIdentifier"

[[steps]]
operation = "DeriveKey"
request = "step2_derive.json"
assert_success = true
[steps.capture]
derived_key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step3_get.json"
assert_success = true
[steps.assert_fields]
KeyMaterial = "D4100799F26A09615A72AF3E58FA3841A2FF20D5ACE3FB392E562E207FE6B718"
