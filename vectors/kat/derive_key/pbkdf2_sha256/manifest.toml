name = "KAT: PBKDF2-SHA256 (known 32-byte password, salt='salt', 4096 iters)"
description = "Known-Answer Test: PBKDF2-SHA256 with 32-byte password key, 4096 iterations"

[[steps]]
operation = "Import"
request = "step1_import_password.json"
assert_success = true
[steps.capture]
base_key_id = "UniqueIdentifier"

[[steps]]
operation = "DeriveKey"
request = "step2_derive.json"
assert_success = true
[steps.capture]
derived_key_id = "UniqueIdentifier"

[[steps]]
operation = "Get"
request = "step3_get.json"
assert_success = true
[steps.assert_fields]
KeyMaterial = "2786B4B5EEDD2099FBE1CE92B8A2DCC3C9853055C3773FFBD38C9E31A117BD97"
