name = "KAT: HMAC-SHA3-256 (key=0x0b*32, msg='Hi There')"
description = "Known-Answer Test: computes HMAC-SHA3-256 of 'Hi There' with a known 32-byte key"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Mac"
request = "step2_compute_mac.json"
assert_success = true

[steps.assert_fields]
MACData = "8AA94CA788D56DCCF58D1E05D754E27A2CCD5C5D11740AC555F0F6D1DD1892C6"
