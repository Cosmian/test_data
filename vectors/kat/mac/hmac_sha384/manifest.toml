name = "KAT: HMAC-SHA-384 (key=0x0b*32, msg='Hi There')"
description = "Known-Answer Test: computes HMAC-SHA-384 of 'Hi There' with a known 32-byte key"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Mac"
request = "step2_compute_mac.json"
assert_success = true

[steps.assert_fields]
MACData = "C3F1615943D1DD07A83BB644B97FB3DC2B8A936AA5389DE2A3E9DD91BC3BAE0D0C30334A301733AA54ED5E1F0769E868"
