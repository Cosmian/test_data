name = "KAT: HMAC-SHA-512 (key=0x0b*32, msg='Hi There')"
description = "Known-Answer Test: computes HMAC-SHA-512 of 'Hi There' with a known 32-byte key"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Mac"
request = "step2_compute_mac.json"
assert_success = true

[steps.assert_fields]
MACData = "CF768C6FD3F08F640F779DDBD9BC3842FE78A261F197DA9C4A958510AC8226DB6B059F6DE7340409ED8DDED44666A63DCD5FC669FC89B50292781E39362DCB58"
