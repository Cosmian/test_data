name = "KAT: HMAC-SHA-256 (key=0x0b*32, msg='Hi There')"
description = "Known-Answer Test: computes HMAC-SHA-256 of 'Hi There' with a known 32-byte key"

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Mac"
request = "step2_compute_mac.json"
assert_success = true

[steps.assert_fields]
MACData = "198A607EB44BFBC69903A0F1CF2BBDC5BA0AA3F3D9AE3C1C7A3B1696A0B68CF7"
