name = "HSM No-KEK: Duplicate re-key without keyset gives actionable error"
description = """
Creates an HSM-resident key WITHOUT a keyset name (no rotate_name). Re-keys it
once (gen-0 → gen-1), then re-keys gen-0 again. Without a keyset guard the
server attempts to create a key with the same UID that already exists — the
error must contain \"already exists\" with an actionable hint pointing the user
to re-key the existing latest key instead.
Finally verifies that re-keying gen-1 (the actual latest) succeeds → gen-2.
"""
server_type = "hsm"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# ── Pre-cleanup ──────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
allow_failure = true

# ── 1. Create gen-0 (no rotate_name) ────────────────────────────────────

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# ── 2. First ReKey gen-0 → gen-1 (SUCCESS) ───────────────────────────────

[[steps]]
operation = "ReKey"
request = "step2_rekey_first.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# ── 3. Second ReKey gen-0 again → FAILURE ────────────────────────────────
#       gen-1 already exists; error must include "already exists".

[[steps]]
operation = "ReKey"
request = "step3_rekey_duplicate.json"
assert_success = false
assert_error_contains = "already exists"

# ── 4. ReKey gen-1 (the actual latest) → SUCCESS ─────────────────────────

[[steps]]
operation = "ReKey"
request = "step4_rekey_gen1.json"
assert_success = true

# ── Cleanup ──────────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
assert_success = true
