name = "HSM Resident: RSA-2048 sign with SHA256WithRSA"
description = """
Creates an RSA-2048 keypair on the HSM and signs with SHA256WithRSA (CKM_SHA256_RSA_PKCS).
Tests: HSM-resident RSA key + oracle-delegated SHA256WithRSA signing.
"""
server_type = "hsm_kek"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# Cleanup
[[steps]]
operation = "Destroy"
request = "step3_destroy_sk.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step4_destroy_pk.json"
allow_failure = true

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true

[[steps]]
operation = "Sign"
request = "step2_sign.json"
assert_success = true
[steps.capture]
signature = "SignatureData"

[[steps]]
operation = "Destroy"
request = "step3_destroy_sk.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step4_destroy_pk.json"
assert_success = true
