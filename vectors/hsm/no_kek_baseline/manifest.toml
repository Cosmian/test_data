name = "Baseline: AES-256-GCM Encrypt/Decrypt without KEK (no HSM)"
description = """
Imports the same AES-256 key as kek_encrypt_decrypt scenario but on a plain SQLite
server without any HSM or KEK. Encrypts with the same fixed IV and verifies the
same deterministic ciphertext is produced. This confirms the crypto result is
identical regardless of whether a KEK wraps the key at rest.
"""
backends = ["sqlite"]

[[steps]]
operation = "Import"
request = "step1_import_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = true
[steps.assert_fields]
Data = "522DC1F099567D07F47F37A32A84427D643A8CDCBFE5C0C97598A2BD2555D1AA8CB08E48590DBB3DA7B08B1056828838C5F61E6393BA7A0ABCC9F662898015AD"
AuthenticatedEncryptionTag = "2DF7CD675B4F09163B41EBF980A7F638"
[steps.capture]
ciphertext = "Data"
auth_tag = "AuthenticatedEncryptionTag"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt.json"
assert_success = true
[steps.assert_fields]
Data = "D9313225F88406E5A55909C5AFF5269A86A7A9531534F7DA2E4C303D8A318A721C3C0C95956809532FCF0E2449A6B525B16AEDF5AA0DE657BA637B391AAFD255"
