name = "HSM Resident: RSA-2048 sign with raw PKCS#1 v1.5"
description = """
Creates an RSA-2048 keypair on the HSM and signs with raw PKCS#1 v1.5
(CKM_RSA_PKCS — caller is responsible for pre-hashing).
Tests: HSM-resident RSA key + oracle-delegated raw PKCS#1v15 signing.
"""
server_type = "hsm_kek"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# Cleanup: destroy keys from any prior run (may not exist)
[[steps]]
operation = "Destroy"
request = "step3_destroy_sk.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step4_destroy_pk.json"
allow_failure = true

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true

[[steps]]
operation = "Sign"
request = "step2_sign.json"
assert_success = true
[steps.capture]
signature = "SignatureData"

[[steps]]
operation = "Destroy"
request = "step3_destroy_sk.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step4_destroy_pk.json"
assert_success = true
