name = "HSM No-KEK: Redirect — re-keying a retired generation redirects to latest"
description = """
Verifies that re-keying a non-latest keyset member is transparently redirected to
the current latest generation rather than rejected. After gen-1 exists, re-keying
the retired gen-0 UID automatically rotates gen-1 → gen-2. Similarly, re-keying
the retired gen-1 UID automatically rotates gen-2 → gen-3.
"""
server_type = "hsm"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# ── Pre-cleanup ──────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0d_cleanup_gen3.json"
allow_failure = true

# ── 1. Create gen-0 ──────────────────────────────────────────────────────

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# ── 2. Assign keyset name ────────────────────────────────────────────────

[[steps]]
operation = "SetAttribute"
request = "step2_set_rotate_name.json"
assert_success = true

# ── 3. ReKey gen-0 → gen-1 (SUCCESS) ────────────────────────────────────

[[steps]]
operation = "ReKey"
request = "step3_rekey_gen0.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# ── 4. ReKey retired gen-0 again → REDIRECT to gen-1 → creates gen-2 ────
#       gen-0 is not the latest; the server transparently rotates gen-1 instead.

[[steps]]
operation = "ReKey"
request = "step4_rekey_gen0_again.json"
assert_success = true

# ── 5. ReKey retired gen-1 → REDIRECT to gen-2 → creates gen-3 ──────────
#       gen-1 is now retired (gen-2 is latest); server redirects to gen-2.

[[steps]]
operation = "ReKey"
request = "step5_rekey_gen1.json"
assert_success = true

# ── Cleanup ──────────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0d_cleanup_gen3.json"
assert_success = true

