name = "KEK-wrapped: Create Ed25519 keypair, sign round-trip"
description = """
Creates an Ed25519 keypair on a KMS server with SoftHSM2 KEK enabled.
The keypair is stored in the database, wrapped at rest by the HSM-resident KEK.
Signs with Ed25519 to confirm the key is usable after unwrapping.
Tests: KEK-wrapped Ed25519 keypair + sign (EdDSA is supported in DB, not on HSM).
"""
server_type = "hsm_kek"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true
[steps.capture]
private_key_id = "PrivateKeyUniqueIdentifier"
public_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Sign"
request = "step2_sign.json"
assert_success = true
[steps.capture]
signature = "SignatureData"
