name = "HSM No-KEK: Consecutive rekey — chain walk covers all 3 generations"
description = """
Creates gen-0 key, rekeys twice (gen-1, gen-2), encrypts once per generation,
then verifies that the bare keyset name chain-walk finds the correct key for
each ciphertext regardless of how many rotations have occurred.

Also validates:
  - Rekey via bare keyset name resolves to the current latest
  - Versioned @N ref for a past generation does NOT chain-walk (expected FAIL)
  - Direct UID still works for any specific generation
"""
server_type = "hsm"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# ── Pre-cleanup ──────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
allow_failure = true

# ── 1. Create gen-0 ──────────────────────────────────────────────────────

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# ── 2. Assign keyset name ────────────────────────────────────────────────

[[steps]]
operation = "SetAttribute"
request = "step2_set_rotate_name.json"
assert_success = true

# ── 3. Encrypt with gen-0 ────────────────────────────────────────────────

[[steps]]
operation = "Encrypt"
request = "step3_encrypt_gen0.json"
assert_success = true
[steps.capture]
ct0   = "Data"
iv0   = "IVCounterNonce"
tag0  = "AuthenticatedEncryptionTag"

# ── 4. ReKey gen-0 → gen-1 ──────────────────────────────────────────────

[[steps]]
operation = "ReKey"
request = "step4_rekey_gen0.json"
assert_success = true
[steps.capture]
key_id_1 = "UniqueIdentifier"

# ── 5. Encrypt with bare keyset name (resolves to gen-1 = latest) ────────

[[steps]]
operation = "Encrypt"
request = "step5_encrypt_gen1.json"
assert_success = true
[steps.capture]
ct1   = "Data"
iv1   = "IVCounterNonce"
tag1  = "AuthenticatedEncryptionTag"

# ── 6. ReKey via bare keyset name (resolves to gen-1 → gen-2) ────────────

[[steps]]
operation = "ReKey"
request = "step6_rekey_by_name.json"
assert_success = true
[steps.capture]
key_id_2 = "UniqueIdentifier"

# ── 7. Decrypt ct0 via bare name → SUCCESS (chain: gen-2 fail, gen-1 fail, gen-0 OK)

[[steps]]
operation = "Decrypt"
request = "step7_decrypt_ct0_chain.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── 8. Decrypt ct1 via bare name → SUCCESS (chain: gen-2 fail, gen-1 OK)

[[steps]]
operation = "Decrypt"
request = "step8_decrypt_ct1_chain.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D532074657374203221"

# ── 9. Decrypt ct0 via gen-0 direct UID → SUCCESS ────────────────────────

[[steps]]
operation = "Decrypt"
request = "step9_decrypt_ct0_direct.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── 10. Decrypt ct1 via gen-1 direct UID → SUCCESS ───────────────────────

[[steps]]
operation = "Decrypt"
request = "step10_decrypt_ct1_direct.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D532074657374203221"

# ── 11. Decrypt ct0 via keyset@2 (versioned, single gen-2) → FAILURE ─────
#        Key material exported from HSM; OpenSSL GCM auth tag mismatch.

[[steps]]
operation = "Decrypt"
request = "step11_decrypt_ct0_at2_fail.json"
assert_success = false
assert_error_contains = "OpenSSL"

# ── Cleanup ──────────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
assert_success = true
