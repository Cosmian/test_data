name = "HSM No-KEK: Encrypt with keyset base UID — generation selection via rotation timing"
description = """
Encrypts with the keyset base UID before rotation (targets gen-0, the only/latest key)
and again after rotation (targets gen-1, the new latest). Verifies that:
- ct_gen0 (encrypted by gen-0 before ReKey) decrypts with gen-0 chain-walk → SUCCESS
- ct_gen1 (encrypted by gen-1 after ReKey) decrypts with gen-1 direct UID → SUCCESS
- ct_gen0 decrypts with gen-1 direct UID → FAILURE (cross-gen isolation)
- ct_gen1 decrypts with gen-0 chain-walk → SUCCESS (chain-walk finds gen-1)
- bare keyset name chain-walk finds the correct key for BOTH ciphertexts

HSM keys use the full base UID as the keyset name (= rotate_name). Unlike SQL
keysets, @first/@latest/@N addressing is not supported for HSM keys; the bare
base UID acts as a stable keyset handle that resolves to the current latest.
"""
server_type = "hsm"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# ── Pre-cleanup ──────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
allow_failure = true

# ── 1. Create gen-0 ──────────────────────────────────────────────────────

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# ── 2. Assign keyset name ────────────────────────────────────────────────

[[steps]]
operation = "SetAttribute"
request = "step2_set_rotate_name.json"
assert_success = true

# ── 3. Encrypt BEFORE ReKey → uses gen-0 (only key, = latest) ────────────
#       Bare keyset UID before rotation resolves to gen-0 (the single key).

[[steps]]
operation = "Encrypt"
request = "step4_encrypt_at_first.json"
assert_success = true
[steps.capture]
ct_gen0  = "Data"
iv_gen0  = "IVCounterNonce"
tag_gen0 = "AuthenticatedEncryptionTag"

# ── 4. ReKey gen-0 → gen-1 ──────────────────────────────────────────────

[[steps]]
operation = "ReKey"
request = "step3_rekey.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# ── 5. Encrypt AFTER ReKey → uses gen-1 (= new latest) ───────────────────
#       Bare keyset UID after rotation resolves to gen-1.

[[steps]]
operation = "Encrypt"
request = "step5_encrypt_at_latest.json"
assert_success = true
[steps.capture]
ct_gen1  = "Data"
iv_gen1  = "IVCounterNonce"
tag_gen1 = "AuthenticatedEncryptionTag"

# ── 6. Decrypt ct_gen0 via chain-walk → SUCCESS ───────────────────────────
#       Chain: gen-1 tried first (fails), gen-0 succeeds.

[[steps]]
operation = "Decrypt"
request = "step6_decrypt_ct0_gen0.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── 7. Decrypt ct_gen1 with gen-1 direct UID → SUCCESS ───────────────────

[[steps]]
operation = "Decrypt"
request = "step7_decrypt_ct1_gen1.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── 8. Decrypt ct_gen0 with gen-1 direct → FAILURE (cross-gen isolation) ──

[[steps]]
operation = "Decrypt"
request = "step8_decrypt_ct0_gen1_fail.json"
assert_success = false
assert_error_contains = "Return code"

# ── 9. Decrypt ct_gen1 via keyset chain-walk → SUCCESS ────────────────────
#       Chain-walk finds gen-1 and decrypts successfully.

[[steps]]
operation = "Decrypt"
request = "step9_decrypt_ct1_gen0_fail.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── 10. Decrypt ct_gen0 via bare keyset name → SUCCESS (chain walk) ───────

[[steps]]
operation = "Decrypt"
request = "step10_decrypt_ct0_chain.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── 11. Decrypt ct_gen1 via bare keyset name → SUCCESS (chain walk) ───────

[[steps]]
operation = "Decrypt"
request = "step11_decrypt_ct1_chain.json"
assert_success = true
[steps.assert_fields]
Data = "48656C6C6F20576F726C642066726F6D20484D53207465737421"

# ── Cleanup ──────────────────────────────────────────────────────────────

[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
assert_success = true
