name = "Access Control: non-owner cannot ReKey without explicit grant"
description = "Owner creates AES key, grants user only Get. User's ReKey attempt is denied because Get wildcard does NOT apply to lifecycle-mutating operations like ReKey."
server_config = "test_data/configs/server/test/cert_auth.toml"

[identities.owner]
client_cert = "test_data/certificates/client_server/owner/owner.client.acme.com.crt"
client_key = "test_data/certificates/client_server/owner/owner.client.acme.com.key"

[identities.user]
client_cert = "test_data/certificates/client_server/user/user.client.acme.com.crt"
client_key = "test_data/certificates/client_server/user/user.client.acme.com.key"

# Step 1: Owner creates an AES-256 key
[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

# Step 2: Owner grants user only Get
[[steps]]
operation = "GrantAccess"
request = "step2_grant_get_only.json"
assert_success = true

# Step 3: User verifies they can Get the key
[[steps]]
operation = "Get"
request = "step3_user_get_ok.json"
identity = "user"
assert_success = true

# Step 4: User attempts ReKey — denied (no ReKey permission)
[[steps]]
operation = "ReKey"
request = "step4_user_rekey_denied.json"
identity = "user"
assert_success = false
assert_error_contains = "no active symmetric key found"

# Step 5: Owner confirms original key still exists and is unmodified
[[steps]]
operation = "Get"
request = "step5_owner_get_still_exists.json"
assert_success = true

# Cleanup
[[steps]]
operation = "Revoke"
request = "owner_revoke_key.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "owner_destroy_key.json"
assert_success = true
