name = "Access Control: owner cannot self-grant"
description = "Owner creates AES key, then attempts to grant themselves additional permissions — which must be denied"
server_config = "test_data/configs/server/test/cert_auth.toml"

[identities.owner]
client_cert = "test_data/certificates/client_server/owner/owner.client.acme.com.crt"
client_key = "test_data/certificates/client_server/owner/owner.client.acme.com.key"

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "GrantAccess"
request = "step2_owner_self_grant.json"
assert_success = false
assert_error_contains = "grant yourself"

[[steps]]
operation = "Revoke"
request = "owner_revoke_key.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "owner_destroy_key.json"
assert_success = true
