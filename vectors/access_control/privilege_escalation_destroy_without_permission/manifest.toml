name = "Access Control: user cannot destroy without permission"
description = "Owner creates AES key, grants user only Get. Get acts as wildcard for crypto ops but NOT for Destroy — user's Destroy attempt is denied."
server_config = "test_data/configs/server/test/cert_auth.toml"

[identities.owner]
client_cert = "test_data/certificates/client_server/owner/owner.client.acme.com.crt"
client_key = "test_data/certificates/client_server/owner/owner.client.acme.com.key"

[identities.user]
client_cert = "test_data/certificates/client_server/user/user.client.acme.com.crt"
client_key = "test_data/certificates/client_server/user/user.client.acme.com.key"

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

# Grant user only Get
[[steps]]
operation = "GrantAccess"
request = "step2_grant_get_only.json"
assert_success = true

# User verifies they can Get
[[steps]]
operation = "Get"
request = "step3_user_get_ok.json"
identity = "user"
assert_success = true

# User attempts Destroy — denied with Item_Not_Found (no Destroy permission, Get wildcard does NOT apply)
[[steps]]
operation = "Destroy"
request = "step4_user_destroy_noop.json"
identity = "user"
assert_success = false
assert_error_reason = "Item_Not_Found"

# Owner confirms key still exists after user's Destroy attempt
[[steps]]
operation = "Get"
request = "step5_owner_get_still_exists.json"
assert_success = true

# Cleanup
[[steps]]
operation = "Revoke"
request = "owner_revoke_key.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "owner_destroy_key.json"
assert_success = true
