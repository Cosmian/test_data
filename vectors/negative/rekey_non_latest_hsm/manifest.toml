name = "HSM Re-Key on retired generation redirects to latest"
description = """
Tests that Re-Key on a retired (non-latest) HSM key is transparently redirected
to the latest generation. Creates gen-0, assigns keyset, rotates to gen-1, then
attempts to Re-Key gen-0 again — the server redirects to gen-1 and creates gen-2.
"""
server_type = "hsm_kek"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# Pre-cleanup
[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
allow_failure = true

# Create gen-0
[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# Assign keyset name
[[steps]]
operation = "SetAttribute"
request = "step2_set_rotate_name.json"
assert_success = true

# ReKey: gen-0 → gen-1 (succeeds)
[[steps]]
operation = "ReKey"
request = "step3_rekey_gen0.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# ReKey retired gen-0 → REDIRECT to gen-1 → creates gen-2
[[steps]]
operation = "ReKey"
request = "step4_rekey_gen0_again.json"
assert_success = true

# Cleanup
[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0c_cleanup_gen2.json"
assert_success = true
