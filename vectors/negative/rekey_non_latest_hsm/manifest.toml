name = "Negative: HSM Re-Key on non-latest keyset member"
description = """
Tests that Re-Key on a retired (non-latest) HSM key is rejected.
Creates gen-0, assigns keyset, rotates to gen-1, then attempts to
Re-Key gen-0 again — must fail because gen-0 is no longer the latest.
"""
server_type = "hsm_kek"
requires_env = ["HSM_SLOT_ID"]
backends = ["sqlite"]

# Pre-cleanup
[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
allow_failure = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
allow_failure = true

# Create gen-0
[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

# Assign keyset name
[[steps]]
operation = "SetAttribute"
request = "step2_set_rotate_name.json"
assert_success = true

# ReKey: gen-0 → gen-1 (succeeds)
[[steps]]
operation = "ReKey"
request = "step3_rekey_gen0.json"
assert_success = true
[steps.capture]
gen1_id = "UniqueIdentifier"

# Attempt to ReKey gen-0 AGAIN — must be rejected (gen-0 is no longer latest)
[[steps]]
operation = "ReKey"
request = "step4_rekey_gen0_again.json"
assert_success = false
assert_error_contains = "not the latest"

# Cleanup
[[steps]]
operation = "Destroy"
request = "step0a_cleanup_gen0.json"
assert_success = true

[[steps]]
operation = "Destroy"
request = "step0b_cleanup_gen1.json"
assert_success = true
