name = "Negative: MAC Verify - Wrong Key Lifecycle State"
description = "Tests that MAC Verify returns Wrong_Key_Lifecycle_State error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "MACVerify"
request = "step2_macverify.json"
assert_success = false
assert_error_contains = "no valid key"
