name = "Negative: RSA-OAEP decrypt garbage ciphertext"
description = "Tests that RSA-OAEP decryption fails when ciphertext is random garbage data"

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true
[steps.capture]
priv_key_id = "PrivateKeyUniqueIdentifier"
pub_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Decrypt"
request = "step2_decrypt_garbage.json"
assert_success = false
assert_error_contains = "decrypt"
