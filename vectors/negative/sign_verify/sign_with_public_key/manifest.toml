name = "Negative: Sign with public key"
description = "Tests that signing fails when attempting to use a public key instead of private key"

[[steps]]
operation = "CreateKeyPair"
request = "step1_create_keypair.json"
assert_success = true
[steps.capture]
priv_key_id = "PrivateKeyUniqueIdentifier"
pub_key_id = "PublicKeyUniqueIdentifier"

[[steps]]
operation = "Sign"
request = "step2_sign_with_pubkey.json"
assert_success = false
assert_error_contains = "no valid key for id"
