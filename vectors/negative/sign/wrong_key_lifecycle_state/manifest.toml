name = "Negative: Sign - Wrong Key Lifecycle State"
description = "Tests that Sign returns Wrong_Key_Lifecycle_State error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Sign"
request = "step2_sign.json"
assert_success = false
assert_error_contains = "no valid key"
