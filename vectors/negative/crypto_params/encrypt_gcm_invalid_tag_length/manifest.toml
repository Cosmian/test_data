name = "Negative: Encrypt GCM With Invalid Tag Length"
description = "Tests that AES-GCM encryption fails with an invalid authentication tag length"

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt_bad_tag.json"
assert_success = false
assert_error_contains = "tag"
