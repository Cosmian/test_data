name = "Negative: Decrypt With Wrong Block Cipher Mode"
description = "Tests that decryption fails when using CBC mode to decrypt data that was encrypted with GCM"

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt_gcm.json"
assert_success = true

[steps.capture]
ciphertext = "Data"
nonce = "IVCounterNonce"
auth_tag = "AuthenticatedEncryptionTag"

[[steps]]
operation = "Decrypt"
request = "step3_decrypt_cbc.json"
assert_success = false
assert_error_contains = "invalid-iv-length"
