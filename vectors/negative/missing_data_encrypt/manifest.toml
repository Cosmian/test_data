name = "Negative: Encrypt Without Data Field"
description = "Tests that encrypt fails when no Data field is provided"

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt_no_data.json"
assert_success = false
assert_error_contains = "data"
