name = "Negative: Decrypt GCM with corrupted ciphertext"
description = "Tests that AES-GCM decryption fails when ciphertext and tag are fabricated"

[[steps]]
operation = "Create"
request = "step1_create_key.json"
assert_success = true
[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Decrypt"
request = "step2_decrypt_corrupted.json"
assert_success = false
assert_error_contains = "CRYPTO"
