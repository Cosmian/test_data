name = "Negative: Decrypt - Wrong Key Lifecycle State"
description = "Tests that Decrypt returns Wrong_Key_Lifecycle_State error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Decrypt"
request = "step2_decrypt.json"
assert_success = false
assert_error_contains = "failed to retrieve the key"
