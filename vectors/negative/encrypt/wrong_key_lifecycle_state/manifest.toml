name = "Negative: Encrypt - Wrong Key Lifecycle State"
description = "Tests that Encrypt returns Wrong_Key_Lifecycle_State error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Encrypt"
request = "step2_encrypt.json"
assert_success = false
assert_error_contains = "not found"
