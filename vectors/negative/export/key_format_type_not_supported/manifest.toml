name = "Negative: Export - Key Format Type Not Supported"
description = "Tests that Export returns Key_Format_Type_Not_Supported error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "Export"
request = "step2_export.json"
assert_success = false
assert_error_contains = "unsupported"
