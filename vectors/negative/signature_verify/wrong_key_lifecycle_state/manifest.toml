name = "Negative: Signature Verify - Wrong Key Lifecycle State"
description = "Tests that Signature Verify returns Wrong_Key_Lifecycle_State error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "SignatureVerify"
request = "step2_signatureverify.json"
assert_success = false
assert_error_contains = "is in state"
