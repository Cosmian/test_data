name = "Negative: Create - Attribute Read Only"
description = "Tests that Create returns Read_Only_Attribute error as per KMIP spec"

[[steps]]
operation = "Create"
request = "step1_create.json"
assert_success = true

[steps.capture]
key_id = "UniqueIdentifier"

[[steps]]
operation = "SetAttribute"
request = "step2_setattribute.json"
assert_success = false
assert_error_contains = "server-managed"
