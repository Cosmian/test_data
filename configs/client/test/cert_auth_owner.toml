# Test KMS client — HTTPS with owner PEM client certificate, no JWT. Owner identity.
# Cert paths are relative to workspace root, resolved by load_client_config().
# Corresponds to server config test/cert_auth.toml (port 9999).

[http_config]
server_url = "https://localhost:9999"
accept_invalid_certs = true
ssl_client_pem_cert_path = "test_data/certificates/client_server/owner/owner.client.acme.com.crt"
ssl_client_pem_key_path = "test_data/certificates/client_server/owner/owner.client.acme.com.key"
