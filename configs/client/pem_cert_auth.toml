# KMS client — mTLS with PEM client certificate (FIPS-compatible).
#
# Use this template when the KMS server requires mutual TLS and you have the
# client certificate and private key as separate PEM files.
#
# Requires: cosmian_kms_client >= 5.18.0
# Configure interactively: ckms configure → "Client certificate (PEM)"

[http_config]
server_url = "https://kms.example.com:9998"
accept_invalid_certs = false

# Path to the client certificate in PEM format (.crt or .pem).
# The file may contain a single leaf certificate or a full chain
# (leaf + intermediates).
tls_client_pem_cert_path = "/path/to/client.crt"

# Path to the client private key in PEM format (.key or .pem).
# Supported formats: PKCS#8 (-----BEGIN PRIVATE KEY-----) and
# traditional RSA/EC (-----BEGIN RSA PRIVATE KEY-----).
tls_client_pem_key_path = "/path/to/client.key"
