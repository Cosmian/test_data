# Test KMS server — TLS with mutual client-certificate authentication + Administrator (ceremony mode).
# `user.client@acme.com` is declared as an Administrator candidate. The role is inactive until a
# 2-of-3 Shamir split-key ceremony is completed by the declared users.
# Bound to port 9996. Loaded by Administrator ceremony test vectors.

default_username = "tech@cosmian.com"
kms_public_url = "https://localhost:9996/google_cse"

administrator_users = ["user.client@acme.com"]
administrator_require_ceremony = true
administrator_threshold = 2
administrator_total_parts = 3

[http]
port = 9996
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_cert_auth_administrator_ceremony"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_cert_auth_administrator_ceremony"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[socket_server]
socket_server_start = true
socket_server_port = 10096
