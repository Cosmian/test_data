# Test KMS server — TLS with mutual client-certificate authentication + Auditor (ceremony mode).
# `user.client@acme.com` is declared as an Auditor candidate (ceremony required).
# `owner.client@acme.com` is an Administrator who can create ceremony shares.
# Bound to port 9990. Loaded by Auditor ceremony test vectors.

default_username = "tech@cosmian.com"
kms_public_url = "https://localhost:9990/google_cse"

[roles]
ceremony_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
administrator_users = ["owner.client@acme.com"]
administrator_require_ceremony = false
auditor_users = ["user.client@acme.com"]
auditor_require_ceremony = true
auditor_threshold = 2
auditor_total_parts = 2

[http]
port = 9990
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_cert_auth_auditor_ceremony"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_cert_auth_auditor_ceremony"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[socket_server]
socket_server_start = true
socket_server_port = 10090
