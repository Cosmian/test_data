# Auto-rotation test server — plain HTTP, no authentication.
# Minimum allowed interval (60 s) — rotation tests must account for this delay.

default_username = "rotation_test_user@example.com"

auto_rotation_check_interval_secs = 60

[http]
port = 10200
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "./sqlite-data-autorotation-tests"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_10200"
tmp_path = "/tmp"
