# Default test KMS server — plain HTTP, no authentication.
# Bound to port 9998. Loaded by start_default_test_kms_server().

default_username = "tech@cosmian.com"
kms_public_url = "http://localhost:9998/google_cse"

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_default"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_default"
tmp_path = "/tmp"

[google_cse_config]
google_cse_enable = true
google_cse_disable_tokens_validation = true
google_cse_incoming_url_whitelist = ["https://cse.cosmian.com"]
