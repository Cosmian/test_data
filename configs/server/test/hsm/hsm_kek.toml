# Test KMS server — HTTPS with client CA, JWT, and Utimaco HSM + KEK.
# Used by start_default_test_kms_server_with_utimaco_and_kek().

default_username = "tech@cosmian.com"
kms_public_url = "https://localhost:10003/google_cse"
hsm_model = "utimaco"
hsm_admin = ["owner.client@acme.com"]
hsm_slot = [0]
hsm_password = ["12345678"]

[http]
port = 10003
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_hsm_kek"
clear_database = false

[workspace]
root_data_path = "/tmp/kms_test_workspace_hsm_kek"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[idp_auth]
jwt_auth_provider = [
  "https://accounts.google.com,https://www.googleapis.com/oauth2/v3/certs,kacls-migration,996739510374-2tauakcggau7kvk37784k0s2lmveb9c9.apps.googleusercontent.com",
  "https://login.microsoftonline.com/612da4de-35c0-42de-ba56-174b69062c96/v2.0,https://login.microsoftonline.com/612da4de-35c0-42de-ba56-174b69062c96/discovery/v2.0/keys",
  "https://demo-kms.eu.auth0.com/,https://demo-kms.eu.auth0.com/.well-known/jwks.json",
]

[google_cse_config]
google_cse_enable = true
google_cse_disable_tokens_validation = false
google_cse_incoming_url_whitelist = ["https://cse.cosmian.com"]
