# Test KMS server — TLS with mutual client-certificate authentication + Administrator (config-only mode).
# `user.client@acme.com` is declared as an Administrator and has owner-equivalent access to all objects
# without requiring a split-key ceremony.
# Bound to port 9997. Loaded by Administrator access-control test vectors.

default_username = "tech@cosmian.com"
kms_public_url = "https://localhost:9997/google_cse"

administrator_users = ["user.client@acme.com"]
administrator_require_ceremony = false

[http]
port = 9997
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_cert_auth_administrator"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_cert_auth_administrator"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[socket_server]
socket_server_start = true
socket_server_port = 10097
