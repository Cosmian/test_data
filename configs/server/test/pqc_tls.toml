# Test KMS server — HTTPS with a PQC (ML-DSA-44) TLS server certificate.
# Requires a TLS client that supports ML-DSA-44 (OpenSSL >= 3.5 or rustls with PQC).
# Uses PEM cert + key generated by OpenSSL 3.5+ (stored in test_data/certificates/).
# Non-FIPS only (PQC algorithms are not available in FIPS mode).

default_username = "tech@cosmian.com"

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_pqc_tls"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_pqc_tls"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/ml_dsa_44.crt"
tls_key_file = "test_data/certificates/client_server/server/ml_dsa_44.key"
# No clients_ca_cert_file — mutual TLS is not enforced.

[logging]
rust_log = "off"
