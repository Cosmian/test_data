# Test KMS server — TLS with mutual client-certificate authentication + Auditor (config-only mode).
# `user.client@acme.com` is declared as an Auditor and has read-only metadata access to all objects.
# Bound to port 9991. Loaded by Auditor access-control test vectors.

default_username = "tech@cosmian.com"
kms_public_url = "https://localhost:9991/google_cse"

auditor_users = ["user.client@acme.com"]
auditor_require_ceremony = false

[http]
port = 9991
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms_test_cert_auth_auditor"
clear_database = true

[workspace]
root_data_path = "/tmp/kms_test_workspace_cert_auth_auditor"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[socket_server]
socket_server_start = true
socket_server_port = 10091
