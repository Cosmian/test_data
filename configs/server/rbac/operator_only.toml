# ── Minimal RBAC — Operator-default ──────────────────────────────────────────
#
# When any role list is configured, unauthenticated users and users not listed
# in any role default to Operator (minimum privilege).
#
# Operator permissions:
#   • Use key material: Encrypt, Decrypt, Sign, SignatureVerify, MAC, Hash
#   • Read metadata:    Get, GetAttributes, Locate, Validate, Export (own objects)
#   • BLOCKED:          Create, Import, Register, Destroy, Revoke, Activate,
#                       CreateKeyPair, CreateSplitKey, JoinSplitKey, ReKey, etc.
#
# This config sets an empty crypto_officer_users list to activate role enforcement
# while leaving all users at the Operator level (no one can do lifecycle ops unless
# explicitly granted Create access).
# ─────────────────────────────────────────────────────────────────────────────

default_username = "admin"

[roles]
# Empty list: triggers role enforcement. All users default to Operator.
crypto_officer_users = []

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms-rbac-operator"
clear_database = false

[workspace]
root_data_path = "/tmp/kms-rbac-operator-workspace"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file  = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[logging]
rust_log = "info,cosmian_kms=info"

[ui_config]
ui_index_html_folder = "ui/dist"
