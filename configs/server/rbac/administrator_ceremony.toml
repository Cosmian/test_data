# ── Administrator role — split-key ceremony mode ─────────────────────────────
#
# Role model: Administrator activated via XOR split-key ceremony
#   NIST SP 800-57 Part 2 Rev 1 §4.3.2 — Dual Control
#   FIPS 140-3 §7.4 — Roles, Services, and Authentication
#   ANSI/INCITS 359-2004 §4.3.1 — Split Knowledge
#
# How the ceremony works:
#   1. A CryptoOfficer (or any key owner) calls CreateSplitKey on a symmetric key,
#      producing `administrator_total_parts` shares using XOR split knowledge.
#   2. Each share is granted (GrantAccess) to one ceremony custodian.
#   3. When `administrator_threshold` custodians in `administrator_users` each call
#      JoinSplitKey, the server persists an activation record in `administrator_activations`.
#   4. From that point, all users in `administrator_users` hold the Administrator role
#      until a POST /access/administrator/disable is issued.
#
# administrator_threshold / administrator_total_parts implement a (t, n) scheme.
# The example below uses 2-of-3: any two of three custodians can activate.
#
# Use-case: regulated environments (PCI-DSS, FIPS 140-3 Annex D) requiring
# split knowledge and dual control for privileged access.
# ─────────────────────────────────────────────────────────────────────────────

default_username = "admin"

[roles]
# Candidate Administrators. The role is inactive until the ceremony completes.
# Certs: test_data/certificates/client_server/custodian-1/custodian-1.example.com.{key,crt}
#        test_data/certificates/client_server/custodian-2/custodian-2.example.com.{key,crt}
#        test_data/certificates/client_server/custodian-3/custodian-3.example.com.{key,crt}
administrator_users            = [
  "custodian-1@example.com",
  "custodian-2@example.com",
  "custodian-3@example.com",
]
administrator_require_ceremony = true
administrator_threshold        = 2   # minimum custodians required to join
administrator_total_parts      = 3   # total shares produced by CreateSplitKey

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms-rbac-administrator-ceremony"
clear_database = false

[workspace]
root_data_path = "/tmp/kms-rbac-administrator-ceremony-workspace"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file  = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[logging]
rust_log = "info,cosmian_kms=info"

[ui_config]
ui_index_html_folder = "ui/dist"
