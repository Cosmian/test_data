# ── Administrator role — config-only mode ────────────────────────────────────
#
# Role model: Administrator (always-on, no ceremony required)
#   NIST SP 800-57 Part 2 Rev 1 §4.3.2 / FIPS 140-3 §7.4
#
# Administrator permissions:
#   • All operations without restriction (bypass per-object ownership check)
#   • Can read, export, and destroy ANY key regardless of who created it
#   • Can Locate all objects across all owners
#
# WARNING: config-only mode grants permanent Administrator access.
#   Use `administrator_require_ceremony = true` (see administrator_ceremony.toml)
#   in environments where dual-control / split-knowledge is required.
#
# Use-case: internal KMS instance where a single trusted operator holds the
# bootstrap role and the deployment is not subject to FIPS 140-3 §7.4.
# ─────────────────────────────────────────────────────────────────────────────

default_username = "admin"

[roles]
# Always-on Administrator (no split-key ceremony required).
# Cert: test_data/certificates/client_server/administrator/administrator.example.com.{key,crt}
administrator_users            = ["administrator@example.com"]
administrator_require_ceremony = false

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms-rbac-administrator"
clear_database = false

[workspace]
root_data_path = "/tmp/kms-rbac-administrator-workspace"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file  = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[logging]
rust_log = "info,cosmian_kms=info"

[ui_config]
ui_index_html_folder = "ui/dist"
