# ── Full RBAC — production reference configuration ──────────────────────────
#
# Role model: CryptoOfficer + Operator
#   FIPS 140-3 §7.4 / NIST SP 800-57 Part 2 Rev 1 §4.3–§4.4
#
# Role hierarchy and permissions:
#
#   ┌──────────────────┬────────────────────────────────────────────────────┐
#   │ Role             │ Permitted operations                               │
#   ├──────────────────┼────────────────────────────────────────────────────┤
#   │ Operator         │ Encrypt, Decrypt, Sign, Verify, MAC, Hash,         │
#   │ (default)        │ GetAttributes, Locate, Validate                    │
#   ├──────────────────┼────────────────────────────────────────────────────┤
#   │ CryptoOfficer    │ Create, Import, Destroy, Revoke, Activate,         │
#   │                  │ Get, Export, CreateKeyPair, CreateSplitKey,        │
#   │                  │ JoinSplitKey, Certify, GrantAccess, RevokeAccess;  │
#   │                  │ bypass per-object ownership check                  │
#   └──────────────────┴────────────────────────────────────────────────────┘
#
# Unenrolled users default to Operator (fail-secure minimum privilege).
# There is no `operator_users` config key — it is the implicit default.
# ─────────────────────────────────────────────────────────────────────────────

default_username = "admin"

[roles]
# ── CryptoOfficer role ────────────────────────────────────────────────────────
# Key-management engineers: create, rotate, revoke keys. Ownership bypass on all objects.
# Certs: test_data/certificates/client_server/crypto-officer-1/crypto-officer-1.example.com.{key,crt}
#        test_data/certificates/client_server/crypto-officer-2/crypto-officer-2.example.com.{key,crt}
crypto_officer_users = [
  "crypto-officer-1@example.com",
  "crypto-officer-2@example.com",
]

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms-rbac-full"
clear_database = false

[workspace]
root_data_path = "/tmp/kms-rbac-full-workspace"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[logging]
rust_log = "info,cosmian_kms=info"

[ui_config]
ui_index_html_folder = "ui/dist"
