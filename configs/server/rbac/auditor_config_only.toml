# ── Auditor role — config-only mode ──────────────────────────────────────────
#
# Role model: Auditor (always-on, no ceremony required)
#   FIPS 140-3 §7.4.2 / NIST SP 800-57 §4.4.4
#
# Auditor permissions (read-only metadata inspection across ALL objects):
#   • Locate   — list all objects regardless of owner
#   • GetAttributes — read attributes of any object without ownership grant
#   • Validate — validate certificates / signatures
#
# Auditor CANNOT:
#   • Get / Export key material
#   • Encrypt, Decrypt, Sign, MAC
#   • Create, Import, Destroy, Revoke, Activate
#   • Modify attributes (SetAttribute, DeleteAttribute)
#
# Enforcement: blocked at dispatch before any handler or ownership check.
#
# Use-case: compliance officers, external auditors, or SIEM integrations that
# need full visibility into the key inventory without access to key material.
# ─────────────────────────────────────────────────────────────────────────────

default_username = "admin"

[roles]
# Always-on Auditor (no split-key ceremony required).
# Cert: test_data/certificates/client_server/auditor-1/auditor-1.example.com.{key,crt}
auditor_users            = ["auditor-1@example.com"]
auditor_require_ceremony = false

[http]
port = 9998
hostname = "0.0.0.0"

[db]
database_type = "sqlite"
sqlite_path = "/tmp/kms-rbac-auditor"
clear_database = false

[workspace]
root_data_path = "/tmp/kms-rbac-auditor-workspace"
tmp_path = "/tmp"

[tls]
tls_cert_file = "test_data/certificates/client_server/server/kmserver.acme.com.crt"
tls_key_file  = "test_data/certificates/client_server/server/kmserver.acme.com.key"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"

[logging]
rust_log = "info,cosmian_kms=info"

[ui_config]
ui_index_html_folder = "ui/dist"
