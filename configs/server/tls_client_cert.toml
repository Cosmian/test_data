# TLS Client Certificate Authentication from authentication.md
[tls]
# This example uses non-FIPS mode (PKCS#12 format)
# For FIPS mode (default build), use tls_cert_file and tls_key_file instead
tls_p12_file = "test_data/certificates/client_server/server/kmserver.acme.com.p12"
tls_p12_password = "password"
clients_ca_cert_file = "test_data/certificates/client_server/ca/ca.crt"
